name: Reactivate Cancelled Member on MembershipWorks
on:
  workflow_dispatch:
    inputs:
      subscriber_username:
        description: 'MembershipWorks username of the member to reactivate'
        required: true
        type: string

jobs:
  reactivate-member:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run reactivation script
        env:
          SUBSCRIBER_USERNAME: ${{ github.event.inputs.subscriber_username }}
          PLATFORM_USERNAME: ${{ secrets.PLATFORM_USERNAME }}
          PLATFORM_PASSWORD: ${{ secrets.PLATFORM_PASSWORD }}
        run: |
          echo "Reactivating account for: $SUBSCRIBER_USERNAME"
          python reactivate_member.py

      - name: Log success
        if: success()
        run: echo "Successfully reactivated ${{ github.event.inputs.subscriber_username }}"

      - name: Log failure
        if: failure()
        run: echo "Failed to reactivate ${{ github.event.inputs.subscriber_username }}"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reactivation-logs
          path: |
            *.log
            screenshots/
          retention-days: 7
